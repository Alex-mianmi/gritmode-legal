<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GritMode — Legal</title>
<meta name="description" content="Legal documents for the GritMode iOS application.">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #555;
    --accent: #0a7d4a;
    --border: #e5e5e5;
    --surface: #f5f5f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --accent: #4dd6a0;
      --border: #2a2d33;
      --surface: #1a1d22;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    max-width: 560px;
    padding: 48px 24px;
    text-align: center;
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .subtitle {
    color: var(--text-muted);
    margin: 0 0 36px;
    font-size: 15px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .links a {
    display: block;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
  }
  .links a:hover {
    border-color: var(--accent);
  }
  .links .label {
    display: block;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .links .hint {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .contact {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 36px;
  }
  .contact a {
    color: var(--accent);
    text-decoration: none;
  }
  .contact a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">GritMode</div>
  <h1>Legal</h1>
  <p class="subtitle">Legal documents for the GritMode iOS application.</p>

  <div class="links">
    <a href="./privacy.html">
      <span class="label">Privacy Policy</span>
      <span class="hint">How we process data when you use GritMode</span>
    </a>
    <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank" rel="noopener">
      <span class="label">Terms of Use (EULA)</span>
      <span class="hint">Apple's Standard End User License Agreement</span>
    </a>
  </div>

  <p class="contact">
    Questions? Contact <a href="mailto:alex.biriulin.pro@gmail.com">alex.biriulin.pro@gmail.com</a>
  </p>
</main>
</body>
</html>
