<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GritMode — Legal</title>
<meta name="description" content="Legal documents for the GritMode iOS application.">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #555;
    --accent: #0a7d4a;
    --border: #e5e5e5;
    --surface: #f5f5f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --text: #e8e8e8;
      --text-muted: #a0a0a0;
      --accent: #4dd6a0;
      --border: #2a2d33;
      --surface: #1a1d22;
    }
  }
  * { box-sizing: border-box; }
  html {
    background: var(--bg);
    min-height: 100%;
  }
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* ========== Matrix rain background (light + dark) ========== */
  #matrix-bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
    opacity: 0.07;
  }
  @media (prefers-color-scheme: dark) {
    #matrix-bg { opacity: 0.12; }
  }
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 3px,
      rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px
    );
  }
  @media (prefers-color-scheme: dark) {
    .scanlines {
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 3px,
        rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
      );
    }
  }
  @media (prefers-reduced-motion: reduce) {
    #matrix-bg, .scanlines { display: none; }
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 560px;
    padding: 48px 24px;
    text-align: center;
  }
  .links a {
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .subtitle {
    color: var(--text-muted);
    margin: 0 0 36px;
    font-size: 15px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }
  .links a {
    display: block;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: var(--text);
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
    text-align: left;
  }
  .links a:hover {
    border-color: var(--accent);
  }
  .links .label {
    display: block;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 4px;
  }
  .links .hint {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }
  .contact {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 36px;
  }
  .contact a {
    color: var(--accent);
    text-decoration: none;
  }
  .contact a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>
<canvas id="matrix-bg" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>
<main>
  <div class="eyebrow">GritMode</div>
  <h1>Legal</h1>
  <p class="subtitle">Legal documents for the GritMode iOS application.</p>

  <div class="links">
    <a href="./privacy.html">
      <span class="label">Privacy Policy</span>
      <span class="hint">How we process data when you use GritMode</span>
    </a>
    <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank" rel="noopener">
      <span class="label">Terms of Use (EULA)</span>
      <span class="hint">Apple's Standard End User License Agreement</span>
    </a>
  </div>

  <p class="contact">
    Questions? Contact <a href="mailto:alex.biriulin.pro@gmail.com">alex.biriulin.pro@gmail.com</a>
  </p>
</main>
<script>
  /* ========== Matrix rain (theme-aware) ========== */
  (function () {
    const canvas = document.getElementById('matrix-bg');
    if (!canvas) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const ctx = canvas.getContext('2d');
    const CHARS = '01アイウエオカキクサシスタチナニABCDEF0123456789>_/[]{}⊕⊗≡';
    const SIZE = 14;
    let cols, drops, dpr;
    const darkMQ = window.matchMedia('(prefers-color-scheme: dark)');
    let dark = darkMQ.matches;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      cols = Math.floor(window.innerWidth / SIZE);
      drops = Array.from({ length: cols }, () => Math.random() * -60);
    }

    function tick() {
      ctx.fillStyle = dark ? 'rgba(15,17,21,0.085)' : 'rgba(255,255,255,0.10)';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.font = SIZE + 'px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
      for (let i = 0; i < cols; i++) {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        const op = 0.20 + Math.random() * 0.55;
        ctx.fillStyle = dark
          ? 'rgba(77,214,160,' + op + ')'
          : 'rgba(10,125,74,' + op + ')';
        ctx.fillText(ch, i * SIZE, drops[i] * SIZE);
        if (drops[i] * SIZE > window.innerHeight && Math.random() > 0.972) {
          drops[i] = Math.random() * -40;
        }
        drops[i] += 0.6;
      }
    }

    resize();
    window.addEventListener('resize', resize);
    if (darkMQ.addEventListener) {
      darkMQ.addEventListener('change', function (e) { dark = e.matches; });
    } else if (darkMQ.addListener) {
      darkMQ.addListener(function (e) { dark = e.matches; });
    }
    setInterval(tick, 75);
  })();
</script>
</body>
</html>
